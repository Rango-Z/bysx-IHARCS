server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-device
          uri: http://localhost:8101
          predicates:
            - Path=/api/user/**,/api/device/**
        - id: device-control
          uri: http://localhost:8103
          predicates:
            - Path=/api/control/**
        - id: datav
          uri: http://localhost:8104
          predicates:
            - Path=/api/datav/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

